name: Seed starter issues

on:
  push:
    branches:
      - main
    paths:
      - .github/starter-issues.json
      - .github/workflows/seed-starter-issues.yml
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create missing starter issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const starterIssues = JSON.parse(fs.readFileSync('.github/starter-issues.json', 'utf8'));
            const labelConfig = JSON.parse(fs.readFileSync('.github/labels.json', 'utf8'));
            const labelsByName = new Map(labelConfig.map((label) => [label.name, label]));

            async function ensureLabel(name) {
              const label = labelsByName.get(name);
              if (!label) {
                return;
              }

              const payload = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description,
              };

              try {
                await github.rest.issues.updateLabel(payload);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel(payload);
              }
            }

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });

            const existingTitles = new Set(existing.map((issue) => issue.title));

            for (const issue of starterIssues) {
              for (const label of issue.labels) {
                await ensureLabel(label);
              }

              if (existingTitles.has(issue.title)) {
                continue;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issue.title,
                body: issue.body,
                labels: issue.labels,
              });
            }
