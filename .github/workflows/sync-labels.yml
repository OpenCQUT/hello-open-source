name: Sync labels

on:
  push:
    branches:
      - main
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync configured labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const labels = JSON.parse(fs.readFileSync('.github/labels.json', 'utf8'));

            for (const label of labels) {
              const payload = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description,
              };

              try {
                await github.rest.issues.updateLabel(payload);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel(payload);
              }
            }
